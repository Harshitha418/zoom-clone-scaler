# Render deploy config (backend)
#
# Alternative to filling out the Render UI — commit this and Render can
# create the service from the repo root when pointed at backend/.

services:
  - type: web
    name: zoom-clone-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt && python seed.py
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: CORS_ORIGINS
        value: https://your-frontend.vercel.app,http://localhost:3000
      - key: FRONTEND_BASE_URL
        value: https://your-frontend.vercel.app
      - key: DATABASE_URL
        value: sqlite:////var/data/zoom_clone.db
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRE_MINUTES
        value: "1440"
    disk:
      name: sqlite-data
      mountPath: /var/data
      sizeGB: 1
